name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: triova-health/package-lock.json
      - name: Install and build
        working-directory: triova-health
        run: |
          npm ci
          npm run build -w @triova/shared
          npm run build -w @triova/gateway
          npm run build -w triova-frontend
